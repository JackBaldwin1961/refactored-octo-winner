<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Glass Calculator</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e1b4b, #111827);
            color: white;
            padding: 20px;
        }

        .calculator {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 25px;
            color: #d1d5db;
            font-size: 0.95rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        input {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            color: white;
        }

        input::placeholder {
            color: #d1d5db;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .add {
            background: #22c55e;
            color: white;
        }

        .subtract {
            background: #f59e0b;
            color: white;
        }

        .multiply {
            background: #3b82f6;
            color: white;
        }

        .divide {
            background: #ef4444;
            color: white;
        }

        .clear {
            width: 100%;
            background: #a855f7;
            color: white;
        }

        .result-box {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .result-box h2 {
            font-size: 1rem;
            margin-bottom: 8px;
            color: #e5e7eb;
        }

        #result {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>Neon Glass Calculator</h1>
        <p class="subtitle">A custom calculator built with HTML, CSS, and JavaScript</p>

        <div class="input-group">
            <input type="number" id="num1" placeholder="Enter first number">
            <input type="number" id="num2" placeholder="Enter second number">
        </div>

        <div class="button-grid">
            <button class="add" onclick="calculate('add')">Add</button>
            <button class="subtract" onclick="calculate('subtract')">Subtract</button>
            <button class="multiply" onclick="calculate('multiply')">Multiply</button>
            <button class="divide" onclick="calculate('divide')">Divide</button>
        </div>

        <button class="clear" onclick="clearCalculator()">Clear</button>

        <div class="result-box">
            <h2>Result:</h2>
            <p id="result">Your answer will appear here</p>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
