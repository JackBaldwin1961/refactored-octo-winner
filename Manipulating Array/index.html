<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manipulating Array</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Manipulating Array</h1>
        <p>Practice using JavaScript array methods like push, pop, shift, unshift, splice, and forEach</p>

        <input type="number" id="elementInput" placeholder="Enter a value">

        <div class="buttons">
            <button id="push">Push</button>
            <button id="pop">Pop</button>
            <button id="shift">Shift</button>
            <button id="unshift">Unshift</button>
            <button id="splice">Splice</button>
        </div>
        
        <h2>Current Array</h2>
        <ul id="arrayList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
